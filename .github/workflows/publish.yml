# Publishes Konklave to PyPI via Trusted Publishing (OpenID Connect).
# No API token needed: PyPI verifies this workflow's identity directly.
# Triggers when you publish a GitHub Release (i.e. push a version tag and
# create a release for it).
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for Trusted Publishing (OIDC). Do not remove.
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the distribution (wheel + sdist)
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
